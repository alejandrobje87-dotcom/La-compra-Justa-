name: Actualizar precios de Mercadona

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

# ESTO INDICA A GITHUB QUE REVISE DENTRO DE TU CARPETA
defaults:
  run:
    working-directory: './LA COMPRA JUSTA'

jobs:
  actualizar-precios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node app.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Actualizar precios Mercadona"
          git push
